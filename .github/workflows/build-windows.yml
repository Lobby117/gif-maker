name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pillow tkinterdnd2 pyinstaller

      - name: Verify libimagequant support
        run: |
          python -c "
          from PIL import Image

          img = Image.new('RGB', (2, 2), color=(255, 0, 0))

          try:
              q = img.quantize(colors=256, method=Image.Quantize.LIBIMAGEQUANT,
                               dither=Image.Dither.FLOYDSTEINBERG)
              print('LIBIMAGEQUANT: OK')
          except (ValueError, OSError) as e:
              print(f'LIBIMAGEQUANT: FAILED -> {e}')
              print('Pillow wheel does not include libimagequant. GIF quality will be degraded.')
              raise SystemExit(1)
          "

      - name: Download gifsicle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://eternallybored.org/misc/gifsicle/releases/gifsicle-1.95-win64.zip" -OutFile "gifsicle.zip"
          Expand-Archive -Path "gifsicle.zip" -DestinationPath "gifsicle_tmp"
          $exe = Get-ChildItem -Path "gifsicle_tmp" -Recurse -Filter "gifsicle.exe" | Select-Object -First 1
          if (-not $exe) { throw "gifsicle.exe not found in archive" }
          Copy-Item $exe.FullName -Destination "gifsicle.exe"
          if (-not (Test-Path "gifsicle.exe")) { throw "Failed to copy gifsicle.exe" }
          Write-Host "gifsicle.exe ready"

      - name: Build EXE
        run: |
          pyinstaller gif_maker_windows.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gif_maker_windows
          path: dist/gif_maker.exe
