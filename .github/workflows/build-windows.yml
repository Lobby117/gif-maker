name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pillow tkinterdnd2 pyinstaller

      - name: Verify quantizer availability
        run: |
          python -c "
          from PIL import Image

          img = Image.new('RGB', (4, 4), color=(255, 128, 0))

          # Check LIBIMAGEQUANT (best quality - not available in PyPI Windows wheels)
          try:
              img.quantize(colors=256, method=Image.Quantize.LIBIMAGEQUANT,
                           dither=Image.Dither.FLOYDSTEINBERG)
              print('LIBIMAGEQUANT: OK (best quality)')
          except (ValueError, OSError) as e:
              print(f'LIBIMAGEQUANT: not available ({e}) - using OCTREE fallback')

          # Verify OCTREE works (required - significantly better than MEDIANCUT)
          try:
              img.quantize(colors=256, method=Image.Quantize.OCTREE,
                           dither=Image.Dither.FLOYDSTEINBERG)
              print('OCTREE: OK (fallback quantizer confirmed)')
          except Exception as e:
              print(f'OCTREE: FAILED -> {e}')
              raise SystemExit(1)
          "

      - name: Download gifsicle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://eternallybored.org/misc/gifsicle/releases/gifsicle-1.95-win64.zip" -OutFile "gifsicle.zip"
          Expand-Archive -Path "gifsicle.zip" -DestinationPath "gifsicle_tmp"
          $exe = Get-ChildItem -Path "gifsicle_tmp" -Recurse -Filter "gifsicle.exe" | Select-Object -First 1
          if (-not $exe) { throw "gifsicle.exe not found in archive" }
          Copy-Item $exe.FullName -Destination "gifsicle.exe"
          if (-not (Test-Path "gifsicle.exe")) { throw "Failed to copy gifsicle.exe" }
          Write-Host "gifsicle.exe ready"

      - name: Build EXE
        run: |
          pyinstaller gif_maker_windows.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gif_maker_windows
          path: dist/gif_maker.exe
