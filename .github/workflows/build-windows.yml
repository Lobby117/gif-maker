name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pillow tkinterdnd2 pyinstaller

      - name: Download gifsicle
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://eternallybored.org/misc/gifsicle/releases/gifsicle-1.96-win64.zip" -OutFile "gifsicle.zip"
          Expand-Archive -Path "gifsicle.zip" -DestinationPath "gifsicle_tmp"
          $exe = Get-ChildItem -Path "gifsicle_tmp" -Recurse -Filter "gifsicle.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "gifsicle.exe"
          Test-Path "gifsicle.exe"

      - name: Build EXE
        run: |
          pyinstaller gif_maker_windows.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gif_maker_windows
          path: dist/gif_maker.exe
